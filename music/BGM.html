<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【金枠の陣】試聴確認用(3倍音量版) - 尽生アンビエント</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #111424, #06070c);
            color: #e0e6ed;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 30px rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 1.5rem;
            color: #d4af37;
            letter-spacing: 0.2em;
            margin-bottom: 5px;
            font-weight: 400;
            text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .subtitle {
            font-size: 0.85rem;
            color: #8a99ad;
            margin-bottom: 30px;
        }
        .status-box {
            font-size: 0.9rem;
            color: #a0aec0;
            margin: 20px 0;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 8px;
            min-height: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            padding: 12px 35px;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        .btn-play {
            background: linear-gradient(135deg, #d4af37, #aa820a);
            color: #111;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.5);
        }
        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.7);
        }
        .btn-stop {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-stop:hover {
            background: rgba(255, 50, 50, 0.2);
            border-color: rgba(255, 50, 50, 0.4);
        }
        /* コアバーストアイコン用スタイリング */
        .icon-container {
            position: relative;
            display: inline-block;
            font-size: 3.5rem;
            margin-bottom: 15px;
        }
        .bulb-core {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowShift 6s linear infinite;
        }
        .bolt-overlay {
            position: absolute;
            top: -2px;
            right: -6px;
            font-size: 1.6rem;
            color: #fffb00;
            text-shadow: 0 0 12px rgba(255,251,0,0.9);
        }
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-container">
        <!-- コアバーストアイコン -->
        <i class="fa-solid fa-lightbulb bulb-core"></i>
        <i class="fa-solid fa-bolt bolt-overlay"></i>
    </div>
    <h1>静止したアワーグラス</h1>
    <div class="subtitle">【金枠の陣】極上アンビエント (3倍音圧ブースト版)</div>
    
    <div class="status-box" id="statusText">静粛中（停止しています）</div>
    
    <div class="btn-group">
        <button class="btn-play" onclick="playMusic()"><i class="fa-solid fa-play"></i> 奏上</button>
        <button class="btn-stop" onclick="stopMusic()"><i class="fa-solid fa-stop"></i> 静粛</button>
    </div>
</div>

<script>
    let audioCtx = null;
    let isPlaying = false;
    let timers = [];
    let masterGain = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playMusic() {
        if (isPlaying) return;
        initAudio();
        
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        isPlaying = true;
        document.getElementById('statusText').innerText = "🔊 3倍の音圧で刻を奏でています…";

        // マスターゲイン設定（音量を前回の3倍である「2.4」に強化）
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(2.4, audioCtx.currentTime + 1.5); // 確実なフェードイン
        masterGain.connect(audioCtx.destination);

        let startTime = audioCtx.currentTime;

        // --- 1. 宿命の秒針 (20秒周期LFO・音量3倍ブースト) ---
        function scheduleTick(time) {
            if (!isPlaying) return;
            
            let cycleTime = (time - startTime) % 20;
            let lfo = cycleTime < 10 ? (cycleTime / 10) : (1 - ((cycleTime - 10) / 10));
            
            // 基準音量と増幅幅を3倍に強化 (通常0.12 〜 最大0.54)
            let tickVolume = 0.12 + (lfo * 0.42);

            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(580, time);
            
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(tickVolume, time + 0.003);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.02);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(time);
            osc.stop(time + 0.03);

            let nextTickTime = time + 1.0;
            let diff = (nextTickTime - audioCtx.currentTime) * 1000;
            let t = setTimeout(() => scheduleTick(nextTickTime), Math.max(0, diff));
            timers.push(t);
        }

        // --- 2. 天使のハミング・ドローン (3倍ブースト) ---
        function scheduleDrone(time, freq, baseVol) {
            if (!isPlaying) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            let filter = audioCtx.createBiquadFilter();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, time);

            filter.type = 'bandpass';
            filter.Q.setValueAtTime(3.8, time);
            filter.frequency.setValueAtTime(960, time); // フォルマント強調

            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(baseVol, time + 3.0);
            gain.gain.linearRampToValueAtTime(baseVol, time + 5.5);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 8.5);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            osc.start(time);
            osc.stop(time + 8.5);

            let roots = [220, 261.63, 293.66, 329.63, 392.00]; // A3, C4, D4, E4, G4
            let nextFreq = roots[Math.floor(Math.random() * roots.length)];
            if (Math.random() > 0.5) nextFreq *= 2; 
            
            let t = setTimeout(() => scheduleDrone(audioCtx.currentTime + 6.5, nextFreq, 0.15), 6500);
            timers.push(t);
        }

        // --- 3. 環境音：結晶の雫 (3倍ブースト) ---
        function scheduleChime() {
            if (!isPlaying) return;
            let time = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(2200 + Math.random() * 1600, time);

            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.06, time + 0.05); // 音量を3倍以上にクッキリと
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 2.8);

            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(time);
            osc.stop(time + 2.9);

            let t = setTimeout(scheduleChime, 3500 + Math.random() * 4500);
            timers.push(t);
        }

        // --- 4. 環境音：波打ち際のミスト (3倍ブースト) ---
        function createMists() {
            if (!isPlaying) return;
            let bufferSize = audioCtx.sampleRate * 5;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            function playMistWave() {
                if (!isPlaying) return;
                let time = audioCtx.currentTime;
                let noise = audioCtx.createBufferSource();
                let filter = audioCtx.createBiquadFilter();
                let gain = audioCtx.createGain();

                noise.buffer = buffer;
                noise.loop = true;

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(280, time);
                filter.frequency.linearRampToValueAtTime(750, time + 3.0);
                filter.frequency.exponentialRampToValueAtTime(220, time + 7.5);

                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(0.045, time + 3.0); // ミストの音量を引き上げ
                gain.gain.exponentialRampToValueAtTime(0.0001, time + 7.5);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);

                noise.start(time);
                noise.stop(time + 7.6);

                let t = setTimeout(playMistWave, 6500 + Math.random() * 3500);
                timers.push(t);
            }
            playMistWave();
        }

        // 各パート一斉起動
        scheduleTick(audioCtx.currentTime);
        scheduleDrone(audioCtx.currentTime, 220, 0.18);
        scheduleDrone(audioCtx.currentTime + 2.0, 329.63, 0.12);
        scheduleChime();
        createMists();
    }

    function stopMusic() {
        isPlaying = false;
        document.getElementById('statusText').innerText = "静粛中（停止しています）";
        
        timers.forEach(t => clearTimeout(t));
        timers = [];

        if (masterGain && audioCtx) {
            masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            setTimeout(() => {
                if (audioCtx) audioCtx.suspend();
            }, 150);
        }
    }
</script>
</body>
</html>
